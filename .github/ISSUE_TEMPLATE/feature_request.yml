name: Feature request
description: Propose a new feature or enhancement.
title: "[feat] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Per [CONTRIBUTING.md](../CONTRIBUTING.md), opening a feature issue does **not** automatically authorize a PR. Wait for a maintainer to label the issue as approved before starting work.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and discussions; this idea is not already proposed.
          required: true
        - label: I have read [CONTRIBUTING.md](../CONTRIBUTING.md), including the AI policy.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Describe the user pain, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would the feature work from the user's perspective? UI, command, behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they are worse.

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: |
        Which crates or areas of the app would this touch?
        Examples: `venore-core/chat`, `venore-desktop/ui`, Ocean Canvas, AI tool inventory, etc.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, references, related issues, prior art.
