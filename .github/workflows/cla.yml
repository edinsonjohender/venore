name: CLA Assistant

# Asks first-time contributors to sign the Contributor License Agreement (CLA.md)
# and blocks the pull request until they do. Signatures are stored in a separate
# private repository so contributors' personal data never lands in this public repo.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # Provided automatically by GitHub Actions.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A Personal Access Token with access to the private signatures repo.
          # Create it and add it as a repository secret named PERSONAL_ACCESS_TOKEN.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-document: 'https://github.com/edinsonjohender/venore/blob/main/CLA.md'
          # Maintainer and bots never need to sign.
          allowlist: edinsonjohender,dependabot[bot],bot*
          # Signatures live in a SEPARATE PRIVATE repo (keeps contributor PII out of the public repo).
          remote-organization-name: edinsonjohender
          remote-repository-name: venore-cla-signatures
          path-to-signatures: 'signatures/version1/cla.json'
          branch: 'main'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you.'
